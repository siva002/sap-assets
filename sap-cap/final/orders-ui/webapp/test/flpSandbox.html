  <!-- Inject Basic Auth header for every OData call based on the mock-user cookie.
       This lets us switch users without relying on Chrome's credential cache. -->
  <script>
    (function patchXHRAuth() {
      function getMockUser() {
        const m = document.cookie.match(/(?:^|;\s*)mock-user=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : null;
      }
      const origOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url) {
        this._mockUrl = typeof url === 'string' ? url : (url && url.toString ? url.toString() : '');
        origOpen.apply(this, arguments);
      };
      const origSetHeader = XMLHttpRequest.prototype.setRequestHeader;
      XMLHttpRequest.prototype.setRequestHeader = function (name) {
        if (name && name.toLowerCase() === 'authorization') return; // let our send() own it
        origSetHeader.apply(this, arguments);
      };
      const origSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function () {
        const user = getMockUser();
        if (user && this._mockUrl && !this._mockUrl.startsWith('http')) {
          origSetHeader.call(this, 'Authorization', 'Basic ' + btoa(user + ':password'));
        }
        origSend.apply(this, arguments);
      };
    })();
  </script>

<script>
  (function () {
    function getCookie(name) {
      const m = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]+)'));
      return m ? decodeURIComponent(m[1]) : null;
    }
    const user = getCookie('mock-user') || '(none — access denied)';
    document.getElementById('mock-user-label').textContent = user;
