specVersion: "4.0"
metadata:
  name: orders-ui
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.fe.templates
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: orders-mock-auth
      afterMiddleware: compression
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /orders
            url: http://localhost:4004
