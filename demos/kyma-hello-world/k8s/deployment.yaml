apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyma-hello-world
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kyma-hello-world
  template:
    metadata:
      labels:
        app: kyma-hello-world
    spec:
      containers:
        - name: kyma-hello-world
          # Replace with your image: docker.io/<your-username>/kyma-hello-world:latest
          image: docker.io/YOUR_DOCKERHUB_USERNAME/kyma-hello-world:latest
          ports:
            - containerPort: 8080
          env:
            # Downward API — Kubernetes injects these at runtime, just like CF injects
            # CF_INSTANCE_INDEX and VCAP_APPLICATION. Same concept, different mechanism.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
